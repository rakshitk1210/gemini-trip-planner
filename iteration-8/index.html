<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Maps — Iteration 8</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-state="empty" data-draw="off" data-tab="restaurants">

  <!-- ═══════════════ NAV RAIL ═══════════════ -->
  <nav class="rail" aria-label="Primary">
    <div class="rail__group">
      <button class="rail__btn rail__btn--icon" data-action="menu" aria-label="Menu">
        <span class="material-symbols-rounded">menu</span>
      </button>
      <button class="rail__btn rail__btn--labeled is-active" data-action="road-trip" aria-label="Road trip">
        <span class="rail__indicator">
          <span class="material-symbols-rounded">directions_car</span>
        </span>
        <span class="rail__label">Road trip</span>
      </button>
      <button class="rail__btn rail__btn--labeled" data-action="saved" aria-label="Saved">
        <span class="rail__indicator">
          <span class="material-symbols-rounded">bookmark</span>
        </span>
        <span class="rail__label">Saved</span>
      </button>
      <button class="rail__btn rail__btn--labeled" data-action="recent" aria-label="Recent">
        <span class="rail__indicator">
          <span class="material-symbols-rounded">history</span>
        </span>
        <span class="rail__label">Recent</span>
      </button>
      <div class="rail__divider"></div>
    </div>
    <div class="rail__group">
      <div class="rail__divider"></div>
      <button class="rail__btn rail__btn--labeled" data-action="get-app" aria-label="Get app">
        <span class="rail__indicator">
          <span class="material-symbols-rounded">phone_android</span>
        </span>
        <span class="rail__label">Get app</span>
      </button>
    </div>
  </nav>

  <!-- ═══════════════ MAP STAGE ═══════════════ -->
  <main class="stage">
    <div class="map" id="map"></div>

    <!-- Floating left-side panels (over the map) -->
    <div class="panels">

      <!-- POI discovery panel (Restaurants/Hotels/Spots from current selection) -->
      <section class="poi-panel" data-poi-panel hidden>
        <header class="poi-panel__header">
          <h2 class="poi-panel__title" data-poi-title>Restaurants</h2>
          <button class="poi-panel__close" data-action="close-poi" aria-label="Close suggestions">
            <span class="material-symbols-rounded">close</span>
          </button>
        </header>
        <div class="poi-panel__list" data-poi-list></div>
      </section>

      <!-- Road trip list panel -->
      <section class="trip-panel" data-trip-panel hidden>
        <header class="trip-panel__header">
          <h2 class="trip-panel__title">Road trip list</h2>
        </header>

        <div class="trip-tabs" role="tablist">
          <button class="trip-tab is-active" role="tab" data-trip-tab="restaurants">
            <span class="trip-tab__label">Restaurants</span>
            <span class="trip-tab__count" data-tab-count="restaurants">0</span>
          </button>
          <button class="trip-tab" role="tab" data-trip-tab="hotels">
            <span class="trip-tab__label">Hotels</span>
            <span class="trip-tab__count" data-tab-count="hotels">0</span>
          </button>
          <button class="trip-tab" role="tab" data-trip-tab="spots">
            <span class="trip-tab__label">Spots</span>
            <span class="trip-tab__count" data-tab-count="spots">0</span>
          </button>
        </div>

        <div class="trip-panel__divider"></div>

        <div class="trip-panel__list" data-trip-list>
          <div class="trip-empty" data-trip-empty>
            <span class="material-symbols-rounded">add_location_alt</span>
            <p>No spots added yet. Tap <strong>Add</strong> on a suggestion to start your list.</p>
          </div>
        </div>
      </section>

    </div>

    <!-- Floating right-side tool clusters -->
    <div class="tools" data-tools>
      <div class="tools__cluster">
        <button class="tools__icon" data-action="draw" aria-label="Draw an area on the map">
          <span class="material-symbols-rounded">highlight_alt</span>
        </button>
        <span class="tools__divider"></span>
        <button class="tools__icon" data-action="edit" aria-label="Edit selection">
          <span class="material-symbols-rounded">edit</span>
        </button>
      </div>
      <div class="tools__cluster">
        <button class="tools__icon" aria-label="Invite collaborators">
          <span class="material-symbols-rounded">group_add</span>
        </button>
        <span class="tools__divider"></span>
        <button class="tools__icon" aria-label="Share">
          <span class="material-symbols-rounded">share</span>
        </button>
      </div>
      <div class="tools__cluster">
        <button class="tools__icon" data-action="zoom-in" aria-label="Zoom in">
          <span class="material-symbols-rounded">add</span>
        </button>
        <span class="tools__divider"></span>
        <button class="tools__icon" data-action="zoom-out" aria-label="Zoom out">
          <span class="material-symbols-rounded">remove</span>
        </button>
      </div>
    </div>

    <!-- Bottom category filter chips (anchored to the bottom-center of the selection rectangle) -->
    <div class="chips-anchor" data-chips-anchor hidden>
      <div class="chips" data-chips data-mode="categories">

        <!-- ── Category mode ── -->
        <div class="chips__group" data-chips-group="categories">
          <button class="chip is-active" data-chip="restaurants">
            <span class="material-symbols-rounded chip__icon">lunch_dining</span>
            <span class="chip__label">Restaurants</span>
          </button>
          <button class="chip" data-chip="hotels">
            <span class="material-symbols-rounded chip__icon">hotel</span>
            <span class="chip__label">Hotels</span>
          </button>
          <button class="chip" data-chip="spots">
            <span class="material-symbols-rounded chip__icon">camera_alt</span>
            <span class="chip__label">Spots</span>
          </button>
          <button class="chip chip--primary" data-action="ask" aria-label="Ask anything about this area">
            <span class="material-symbols-rounded chip__icon">auto_awesome</span>
          </button>
        </div>

        <!-- ── Ask mode ── (toggled by the blue chip) -->
        <div class="chips__group chips__group--input" data-chips-group="input">
          <button class="chip chip--ghost" data-action="ask-cancel" aria-label="Back to categories">
            <span class="material-symbols-rounded chip__icon">arrow_back</span>
          </button>
          <div class="chip-input">
            <span class="material-symbols-rounded chip-input__icon">auto_awesome</span>
            <input
              type="text"
              class="chip-input__field"
              data-chip-input
              placeholder="Ask AI to find places in this area"
              aria-label="Ask AI to find places in this area">
            <button class="chip-input__send" data-action="ask-submit" aria-label="Search">
              <span class="material-symbols-rounded">arrow_forward</span>
            </button>
          </div>
        </div>

      </div>
    </div>

    <!-- Onboarding hint that appears before any area is drawn -->
    <div class="hint" data-hint>
      <span class="material-symbols-rounded hint__icon">highlight_alt</span>
      <div class="hint__copy">
        <strong>Mark an area to explore</strong>
        <span>Tap the highlight tool, then drag on the map to draw a region.</span>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
  <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBf8PLNhxkojFJyyNdctLE57nexC2c1a8A&libraries=drawing&callback=initMap"></script>
</body>
</html>
